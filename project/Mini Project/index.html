<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25 Ags 2025</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="variation-7">
        <input type="text" id="result" readonly>
        <div class="buttons">
            <button class="clear">C</button>
            <button class="delete">Del</button>
            <button class="operator">/</button>
            <button class="operator">*</button>

            <button class="operator">-</button>
            <button class="operator">**</button>
            <button class="operator">3,14</button>
            <button class="operator">00</button>

            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator" style="grid-row: span 2;">+</button>
            
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            
            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="equals" style="grid-row: span 2;">=</button>
            
            <button style="grid-column: span 2;" class="number">0</button>
            <button class="decimal">.</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
