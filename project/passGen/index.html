<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwored Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
    <h1> Password Generator</h1>
    <label for="">Password Length</label>
    <input type="number" id="length" name="length" min="6" max="9999" value="12" required><br>
    <label for="">Include Uppercase Letters</label>
    <input type="checkbox" id="upper" checked>
    <label for="">Include Number</label>
    <input type="checkbox" id="nums" checked>
    <label for="">Inculude Symbol</label>
    <input type="checkbox" id="special" checked><br>

    <button id="generate" onclick="generate()">Generate Password</button>
    <button id="reset" onclick="reset()">Reset Password</button>
    <div class="output" id="passOut">Your Password Show Here</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
